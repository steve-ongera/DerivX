<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────────── -->
    <title>DerivX — Trade Forex, Crypto & Synthetic Indices</title>
    <meta name="description" content="Trade Forex, Crypto, Volatility Indices and Synthetic markets on DerivX. Rise/Fall, Even/Odd, Touch contracts with automated robot trading. Deposit via M-Pesa, PayPal or Binance." />
    <meta name="keywords" content="binary options, forex trading, volatility index, crypto trading, rise fall, even odd trading, robot trading, M-Pesa, synthetic indices" />
    <meta name="author" content="DerivX" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.derivx.com/" />

    <!-- ── Open Graph ──────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.derivx.com/" />
    <meta property="og:title" content="DerivX — Trade Forex, Crypto & Synthetic Indices" />
    <meta property="og:description" content="Trade binary options and CFDs with automated robots. Deposit via M-Pesa, PayPal or Binance." />
    <meta property="og:image" content="https://www.derivx.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="DerivX" />

    <!-- ── Twitter Card ───────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DerivX" />
    <meta name="twitter:title" content="DerivX — Trade Forex, Crypto & Synthetic Indices" />
    <meta name="twitter:description" content="Binary options and CFD trading with robot automation." />
    <meta name="twitter:image" content="https://www.derivx.com/og-image.png" />

    <!-- ── Theme & PWA ─────────────────────────────────────────── -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  

    <!-- ── Bootstrap Icons CDN ───────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />

    <!-- ── Schema.org JSON-LD ─────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FinancialService",
        "name": "DerivX",
        "url": "https://www.derivx.com",
        "logo": "https://www.derivx.com/logo.png",
        "description": "Online trading platform for Forex, Crypto, Volatility Indices and Synthetic markets.",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "support@derivx.com"
        }
      }
    </script>

    <!-- ── Preconnects ─────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  </head>

  <body>
    <div id="root">
      <!-- Inline loading screen shown before React mounts -->
      <div id="initial-loader" style="
        position:fixed; inset:0;
        background:#0f172a;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:16px; z-index:9999;
      ">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="56" height="56" rx="12" fill="#6366f1"/>
          <path d="M14 38 L22 18 L28 30 L34 20 L42 38" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="42" cy="38" r="3" fill="#22d3ee"/>
        </svg>
        <div style="color:#94a3b8; font-family:system-ui,sans-serif; font-size:14px; letter-spacing:0.05em;">
          Loading DerivX…
        </div>
        <div style="
          width:48px; height:3px; background:#1e293b; border-radius:99px; overflow:hidden;
        ">
          <div style="
            height:100%; background:#6366f1;
            animation: loadbar 1.2s ease-in-out infinite;
            border-radius:99px;
          "></div>
        </div>
        <style>
          @keyframes loadbar {
            0%   { width: 0%; margin-left: 0; }
            50%  { width: 80%; margin-left: 10%; }
            100% { width: 0%; margin-left: 100%; }
          }
        </style>
      </div>
    </div>

    <!-- React entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
